services:
  kirolink:
    build:
      context: .
      dockerfile: Dockerfile
    image: kirolink:latest
    container_name: kirolink
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOME: /home/kirolink
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
